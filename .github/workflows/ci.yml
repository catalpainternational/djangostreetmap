name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install OS deps for GeoDjango
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin
      - name: Install dependencies
        run: uv sync --dev
      - name: mypy
        run: uv run mypy djangostreetmap maplibre

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: post1234
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 49155:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install OS deps for GeoDjango
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin
      - name: Install dependencies
        run: uv sync --dev
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 49155 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: Run tests
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=60
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
